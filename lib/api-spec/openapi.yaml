openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stocks
    description: Stock movement explanation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stocks/analyze:
    post:
      operationId: analyzeStock
      tags: [stocks]
      summary: Analyze a stock movement question
      description: Generate a structured, AI-powered explanation for why a stock moved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeStockBody"
      responses:
        "200":
          description: Stock movement analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AnalyzeStockBody:
      type: object
      properties:
        query:
          type: string
          description: Natural language question, e.g. "Why did Apple stock fall today?"
          minLength: 3
          maxLength: 500
      required:
        - query
    NewsItem:
      type: object
      properties:
        headline:
          type: string
        sentiment:
          type: string
          enum: [Positive, Negative, Neutral]
        impact:
          type: string
      required:
        - headline
        - sentiment
        - impact
    StockAnalysis:
      type: object
      properties:
        companyName:
          type: string
        ticker:
          type: string
        priceMovement:
          type: string
        percentChange:
          type: string
        newsSentiment:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
        overallSentiment:
          type: string
        marketSignals:
          type: array
          items:
            type: string
        technicalAnalysis:
          type: array
          items:
            type: string
        finalExplanation:
          type: string
        confidenceLevel:
          type: string
          enum: [High, Medium, Low]
        confidenceReason:
          type: string
        dataNotes:
          type: string
          description: Notes about missing or limited data, when applicable
      required:
        - companyName
        - priceMovement
        - newsSentiment
        - overallSentiment
        - marketSignals
        - technicalAnalysis
        - finalExplanation
        - confidenceLevel
        - confidenceReason
