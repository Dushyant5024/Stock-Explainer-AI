kind = "web"
previewPath = "/"
title = "Stock Explanation AI"
version = "1.0.0"
id = "artifacts/stock-explainer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26166

[services.development]
run = "pnpm --filter @workspace/stock-explainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stock-explainer", "run", "build" ]
publicDir = "artifacts/stock-explainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26166"
BASE_PATH = "/"
